                    <div class="flex-1 sm:w-48">
                        <div class="flex justify-between text-xs font-semibold text-slate-600 mb-1">
                            <span>Progression</span>
                            <span id="progress-text">0%</span>

                        </div>
                    </div>
                    <button id="btn-submit" onclick="handleSubmit()" disabled class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2 rounded-lg font-semibold text-sm transition-colors shadow-sm whitespace-nowrap">
                        Valider
                    </button>
                </div>

                <!-- Action section (Recommencer) -->
                <div id="action-recommencer" class="hidden">
                    <button onclick="handleReset()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-semibold text-sm transition-colors">
                        <i data-lucide="refresh-ccw" class="w-4 h-4"></i> Recommencer
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- Results Banner -->
        <div id="results-banner" class="hidden mb-8 p-6 bg-white border-2 border-blue-100 rounded-2xl shadow-sm text-center transform transition-all duration-500">
            <i data-lucide="award" class="mx-auto text-blue-500 mb-3 w-12 h-12"></i>
            <h2 class="text-3xl font-bold text-slate-900 mb-2">Résultat Final</h2>
            <div class="text-5xl font-black text-blue-600 mb-4">
                <span id="score-text">0</span> <span class="text-2xl text-slate-400">/ 100</span>
            </div>
            <p id="score-message" class="text-slate-600"></p>
        </div>

        <!-- Questions List -->
        <div id="questions-container" class="space-y-6">
            <!-- Questions will be injected here via JavaScript -->
        </div>
        
        <!-- Bottom Actions -->
        <div class="mt-12 flex justify-center pb-8">
            <button id="btn-submit-bottom" onclick="handleSubmit()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:shadow-xl transition-all">

        const letters = ['A', 'B', 'C', 'D'];
        let answers = {};
        let submitted = false;

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            lucide.createIcons();
        });

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';
            
            questionsData.forEach((q, index) => {
                const isNewPart = index === 0 || questionsData[index - 1].part !== q.part;
                
                if (isNewPart) {
                    html += `<h3 class="text-xl font-bold text-slate-800 mt-12 mb-4 pb-2 border-b-2 border-slate-200">${q.part}</h3>`;
                }
                
                html += `
                <div id="q-container-${q.id}" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 transition-all duration-300 hover:border-blue-200">
                    <div class="flex gap-4 mb-4">
                        <span class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-700 font-bold text-sm">
                            ${q.id}
                        </span>
                        <h4 class="text-lg font-medium text-slate-800 mt-1 leading-snug">
                            ${q.question}
                        </h4>
                    </div>

                    <div class="space-y-3 pl-12">
                        ${q.options.map((opt, optIdx) => `
                            <div id="opt-${q.id}-${optIdx}" onclick="handleSelect(${q.id}, ${optIdx})" class="relative flex items-start gap-3 p-4 rounded-lg border-2 border-slate-100 bg-slate-50 cursor-pointer transition-all duration-200 ease-in-out group hover:border-blue-200 hover:bg-slate-100/50">
                                <div id="letter-${q.id}-${optIdx}" class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded border border-slate-300 font-semibold text-xs mt-0.5 text-slate-500 group-hover:border-blue-400">
                                    ${letters[optIdx]}
                                </div>
                                <span class="leading-relaxed text-slate-700">${opt}</span>
                                
                                <!-- Icons for submitted state -->
                                <i data-lucide="check-circle-2" id="icon-check-${q.id}-${optIdx}" class="hidden absolute right-4 top-4 text-green-500 w-5 h-5"></i>
                                <i data-lucide="x-circle" id="icon-x-${q.id}-${optIdx}" class="hidden absolute right-4 top-4 text-red-500 w-5 h-5"></i>
                            </div>
                        `).join('')}
                    </div>
                    
                    <!-- Missing answer warning -->
                    <div id="warning-${q.id}" class="hidden mt-4 pl-12 flex items-center gap-2 text-amber-600 text-sm font-medium">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i> Vous n'avez pas répondu à cette question.
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        function handleSelect(questionId, optionIndex) {
            if (submitted) return;
            answers[questionId] = optionIndex;
            updateQuestionUI(questionId);
            updateProgress();
            
            document.getElementById('btn-submit').disabled = false;
        }

        function updateQuestionUI(qId) {
            const q = questionsData.find(x => x.id === qId);
            const selectedIdx = answers[qId];

            for (let i = 0; i < q.options.length; i++) {
                const optDiv = document.getElementById(`opt-${qId}-${i}`);
                const letterDiv = document.getElementById(`letter-${qId}-${i}`);
                const isSelected = selectedIdx === i;

                if (!submitted) {
                    optDiv.className = `relative flex items-start gap-3 p-4 rounded-lg border-2 cursor-pointer transition-all duration-200 ease-in-out group ${isSelected ? "border-blue-500 bg-blue-50/50" : "border-slate-100 hover:border-blue-200 bg-slate-50 hover:bg-slate-100/50"}`;
                    letterDiv.className = `flex-shrink-0 flex items-center justify-center w-6 h-6 rounded border font-semibold text-xs mt-0.5 ${isSelected ? "bg-blue-500 border-blue-500 text-white" : "border-slate-300 text-slate-500 group-hover:border-blue-400"}`;
                } else {
                    const isCorrectAnswer = q.answer === i;
                    let optClasses = "relative flex items-start gap-3 p-4 rounded-lg border-2 cursor-default transition-all duration-200 ease-in-out group ";
                    let letterClasses = "flex-shrink-0 flex items-center justify-center w-6 h-6 rounded border font-semibold text-xs mt-0.5 ";

                    if (isCorrectAnswer) {
                        optClasses += "border-green-500 bg-green-50 text-green-900 font-medium ";
                        letterClasses += "bg-green-500 border-green-500 text-white";
                        document.getElementById(`icon-check-${qId}-${i}`).classList.remove('hidden');
                    } else if (isSelected && !isCorrectAnswer) {
                        optClasses += "border-red-400 bg-red-50 text-red-900 ";
                        letterClasses += "bg-red-500 border-red-500 text-white";
                        document.getElementById(`icon-x-${qId}-${i}`).classList.remove('hidden');
                    } else {
                        optClasses += "border-slate-100 bg-white opacity-50 ";
                        letterClasses += "border-slate-200 text-slate-400";
                    }
                    optDiv.className = optClasses;
                    letterDiv.className = letterClasses;
                }
            }
        }

        function updateProgress() {
            const answeredCount = Object.keys(answers).length;
            const progress = Math.round((answeredCount / questionsData.length) * 100);
            document.getElementById('progress-text').innerText = `${progress}%`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function handleSubmit() {
            if (Object.keys(answers).length === 0) return;
            
            let currentScore = 0;
            submitted = true;

            // Calculate score and update UI for all questions
            questionsData.forEach(q => {
                const selectedIdx = answers[q.id];
                if (selectedIdx === q.answer) {
                    currentScore++;
                }
                
                // Trigger UI update to display correct/incorrect classes
                updateQuestionUI(q.id);

                // Show warnings for unanswered questions
                const qContainer = document.getElementById(`q-container-${q.id}`);
                const warningDiv = document.getElementById(`warning-${q.id}`);
                
                qContainer.classList.remove('hover:border-blue-200');
                if (selectedIdx === undefined) {
                    warningDiv.classList.remove('hidden');
                    qContainer.classList.replace('border-slate-200', 'border-red-200');
                } else {
                    const isCorrect = selectedIdx === q.answer;
                    qContainer.classList.replace('border-slate-200', isCorrect ? 'border-green-200' : 'border-red-200');
                    if (qContainer.classList.contains('border-blue-500')) {
                       qContainer.classList.remove('border-blue-500');
                       qContainer.classList.add(isCorrect ? 'border-green-200' : 'border-red-200');
                    }
                }
            });

            // Update Results Banner
            document.getElementById('score-text').innerText = currentScore;
            
            let message = '';
            if (currentScore >= 80) message = 'Excellent travail ! Vous maîtrisez les concepts didactiques.';
            else if (currentScore >= 50) message = 'Bon travail, mais quelques révisions sont encore nécessaires.';
            else message = 'Il faut revoir vos cours de didactique, ne vous découragez pas !';
            
            document.getElementById('score-message').innerText = message;
            document.getElementById('results-banner').classList.remove('hidden');

            // Swap header actions
            document.getElementById('action-valider').classList.add('hidden');
            document.getElementById('action-recommencer').classList.remove('hidden');
            
            // Swap bottom actions
            document.getElementById('btn-submit-bottom').classList.add('hidden');
            document.getElementById('btn-top-bottom').classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleReset() {
            if (confirm('Voulez-vous vraiment recommencer ? Toutes vos réponses seront perdues.')) {
                answers = {};
                submitted = false;
                
                // Reset UI
                renderQuestions();
                lucide.createIcons();
                updateProgress();
                document.getElementById('btn-submit').disabled = true;
                
                // Hide Banner
                document.getElementById('results-banner').classList.add('hidden');
                
                // Swap Header Actions
                document.getElementById('action-valider').classList.remove('hidden');
                document.getElementById('action-recommencer').classList.add('hidden');
                
                // Swap Bottom Actions
                document.getElementById('btn-submit-bottom').classList.remove('hidden');
                document.getElementById('btn-top-bottom').classList.add('hidden');

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
